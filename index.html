<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>CS2 Premium</title>
    <style>
        :root {
            --bg: #0F1115;
            --panel: #1A1D24;
            --accent: #00FFA3; /* Неоновый зеленый */
            --primary: #007BFF; /* Синий */
            --text: #E0E0E0;
            --muted: #6B7280;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Верхняя панель */
        .header { background: rgba(26, 29, 36, 0.9); padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .balance { font-size: 15px; font-weight: 800; color: var(--text); display: flex; gap: 15px; }
        .bal-item span { color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 163, 0.4); margin-right: 4px; }
        .bal-item.energy span { color: var(--primary); text-shadow: 0 0 10px rgba(0, 123, 255, 0.4); }

        /* Вкладки */
        .tab { display: none; padding: 20px; padding-bottom: 90px; animation: slideUp 0.3s ease; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Арена */
        .arena-top { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; letter-spacing: 1px; }
        .arena-top .live { color: var(--accent); text-shadow: 0 0 8px rgba(0, 255, 163, 0.5); }
        
        .wheel-wrap { width: 240px; height: 240px; margin: 0 auto 40px; position: relative; border-radius: 50%; background: conic-gradient(from 0deg, var(--primary) 0% 15%, #2A2D3A 15% 50%, var(--accent) 50% 100%); padding: 3px; box-shadow: 0 0 40px rgba(0, 123, 255, 0.15); transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .wheel-inner { background: var(--bg); width: 100%; height: 100%; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-inner h2 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .wheel-inner p { margin: 4px 0 0; font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }

        /* Кнопка */
        .btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0, 255, 163, 0.3); transition: transform 0.1s; cursor: pointer; }
        .btn:active { transform: scale(0.96); }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; cursor: pointer; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 6px; transition: 0.3s; }
        .nav-item.active { color: var(--text); }
        .nav-item.active svg { fill: var(--primary); filter: drop-shadow(0 0 8px rgba(0, 123, 255, 0.6)); }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">
            <div class="bal-item energy"><span>⚡</span> 120</div>
            <div class="bal-item"><span>🪙</span> 1,450</div>
        </div>
    </div>

    <div id="tab-arena" class="tab active">
        <div class="arena-top">
            <span>Всего билетов: 4,202</span>
            <span class="live">Старт: 00:24</span>
        </div>
        
        <div class="wheel-wrap" id="wheel">
            <div class="wheel-inner">
                <h2>АРЕНА</h2>
                <p>Ожидание</p>
            </div>
        </div>

        <button class="btn" onclick="spinWheel()">Войти в раунд (10 ⚡)</button>
    </div>

    <div id="tab-signals" class="tab">
        <div style="background: var(--panel); border-radius: 16px; padding: 20px; border-left: 4px solid var(--accent); margin-bottom: 15px;">
            <div style="font-size: 10px; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Аналитика рынка</div>
            <h3 style="margin: 0 0 8px; font-size: 18px;">M4A4 падает в цене 📉</h3>
            <p style="margin: 0; font-size: 14px; color: #9ca3af; line-height: 1.5;">Частота пиков на про-сцене упала на 14%. Совет: держите скины на M4A1-S, ликвидность A4 падает.</p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="btn-arena" onclick="switchTab('arena')">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg>
            Арена
        </div>
        <div class="nav-item" id="btn-signals" onclick="switchTab('signals')">
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
            Сигналы
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#1A1D24'); // Красим системную шапку телеги

        function switchTab(tabName) {
            document.getElementById('tab-arena').classList.remove('active');
            document.getElementById('tab-signals').classList.remove('active');
            document.getElementById('btn-arena').classList.remove('active');
            document.getElementById('btn-signals').classList.remove('active');

            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');

            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function spinWheel() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            const wheel = document.getElementById('wheel');
            const rotation = Math.floor(Math.random() * 1440) + 1440;
            wheel.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
