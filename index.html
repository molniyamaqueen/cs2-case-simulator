<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CS PRO HUB</title>
    
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0a0a0c; /* Наш фирменный черный цвет */
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .cs-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .cs-logo {
        width: 70px;
        height: 70px;
        background-color: #f97316; /* Оранжевый CS */
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
        color: #000;
        margin-bottom: 24px;
        animation: pulse 1.5s infinite;
      }
      .cs-text {
        font-size: 12px;
        font-weight: bold;
        color: #6b7280;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .cs-progress {
        width: 180px;
        height: 4px;
        background-color: #1f2937;
        border-radius: 4px;
        margin-top: 20px;
        overflow: hidden;
        position: relative;
      }
      .cs-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 30%;
        background-color: #f97316;
        animation: loading 1.5s infinite ease-in-out;
        border-radius: 4px;
      }
      /* Анимация пульсации логотипа */
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.5); }
        70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
      }
      /* Анимация бегающей полосы */
      @keyframes loading {
        0% { left: -30%; width: 30%; }
        50% { width: 50%; }
        100% { left: 100%; width: 30%; }
      }
    </style>
  </head>
  <body>
    
    <div id="root">
      
      <div class="cs-loader">
        <div class="cs-logo">CS</div>
        <div class="cs-text">Connecting to Server...</div>
        <div class="cs-progress">
          <div class="cs-bar"></div>
        </div>
      </div>
      
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
