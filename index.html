<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>CS2 Premium</title>
    
    <script>
        // Настраиваем киберспортивные цвета
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0F1115',
                        panel: '#1A1D24',
                        accent: '#00FFA3', /* Неоновый зеленый */
                        primary: '#007BFF', /* Синий */
                        muted: '#8B92A5',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0F1115; color: white; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Светящаяся круглая арена */
        .arena-circle {
            background: conic-gradient(from 0deg, #007BFF 0% 20%, #2A2D3A 20% 60%, #00FFA3 60% 100%);
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.2);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-dark/90 backdrop-blur-md border-b border-white/10 px-4 py-3 flex justify-between items-center">
        <button class="w-10 h-10 rounded-xl bg-panel border border-white/10 text-muted flex items-center justify-center">
            <i class="fa-solid fa-info"></i>
        </button>
        
        <div class="flex gap-4 font-bold text-sm">
            <div class="flex items-center gap-1.5"><span class="text-primary text-lg">⚡</span> 120</div>
            <div class="flex items-center gap-1.5"><span class="text-accent text-lg">🪙</span> 1,450</div>
        </div>

        <button class="w-10 h-10 rounded-xl bg-panel border border-white/10 text-muted flex items-center justify-center">
            <i class="fa-solid fa-comment-dots"></i>
        </button>
    </header>

    <div id="tab-arena" class="tab-content active px-4 pt-6">
        <div class="flex justify-between items-center text-xs font-bold text-muted uppercase tracking-wider mb-8">
            <span>🔥 Билетов: 4,202</span>
            <span class="text-accent">Старт: 00:24</span>
        </div>
        
        <div class="relative w-64 h-64 mx-auto mb-10">
            <div id="wheel" class="arena-circle w-full h-full rounded-full flex items-center justify-center">
                <div class="w-56 h-56 bg-dark rounded-full flex flex-col items-center justify-center z-10">
                    <h2 class="text-3xl font-black tracking-wider">АРЕНА</h2>
                    <p class="text-primary text-xs font-bold tracking-widest mt-1 uppercase">Жми старт</p>
                </div>
            </div>
        </div>

        <button onclick="playArena()" class="w-full bg-accent text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm shadow-[0_0_20px_rgba(0,255,163,0.3)] active:scale-95 transition-transform">
            Войти в раунд (10 ⚡)
        </button>
    </div>

    <div id="tab-signals" class="tab-content px-4 pt-6">
        <div class="bg-panel rounded-2xl p-5 border-l-4 border-primary mb-4 relative overflow-hidden">
            <div class="text-[10px] text-muted font-bold uppercase tracking-wider mb-2">Интерактив: Миф или Факт</div>
            <h3 class="font-bold text-lg mb-2">Звук разминирования</h3>
            <p class="text-sm text-gray-400 mb-4">"Звук дефуза бомбы слышен на всей карте ровно за 10 секунд до взрыва."</p>
            <div class="flex gap-3">
                <button class="flex-1 py-2 border border-white/10 rounded-xl text-sm font-bold text-gray-300">❌ Миф</button>
                <button class="flex-1 py-2 border border-white/10 rounded-xl text-sm font-bold text-gray-300 bg-white/5">✅ Факт</button>
            </div>
        </div>
        
        <div class="bg-panel rounded-2xl p-5 border-l-4 border-accent">
            <div class="text-[10px] text-muted font-bold uppercase tracking-wider mb-2">Аналитика рынка</div>
            <h3 class="font-bold text-lg mb-2">M4A4 падает в цене 📉</h3>
            <p class="text-sm text-gray-400">Частота покупок на турнирах упала на 14%. Совет: держите скины на M4A1-S.</p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-panel border-t border-white/10 px-2 py-2 flex justify-between z-50 pb-safe">
        <button onclick="switchTab('arena')" id="btn-arena" class="nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-primary">
            <i class="fa-solid fa-crosshairs text-xl drop-shadow-[0_0_8px_rgba(0,123,255,0.5)]"></i>
            <span class="text-[10px] font-bold uppercase">Арена</span>
        </button>
        <button onclick="switchTab('signals')" id="btn-signals" class="nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-muted hover:text-white/70">
            <i class="fa-solid fa-chart-simple text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Сигналы</span>
        </button>
        <button class="nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-muted hover:text-white/70">
            <i class="fa-solid fa-robot text-xl"></i>
            <span class="text-[10px] font-bold uppercase">AI Помощник</span>
        </button>
        <button class="nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-muted hover:text-white/70">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Профиль</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Простое переключение вкладок
        function switchTab(tabName) {
            // Скрываем все вкладки
            document.getElementById('tab-arena').classList.remove('active');
            document.getElementById('tab-signals').classList.remove('active');
            
            // Красим все кнопки в серый
            document.getElementById('btn-arena').className = "nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-muted";
            document.getElementById('btn-signals').className = "nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-muted";
            
            // Убираем свечение с иконок
            document.querySelector('#btn-arena i').classList.remove('drop-shadow-[0_0_8px_rgba(0,123,255,0.5)]');
            document.querySelector('#btn-signals i').classList.remove('drop-shadow-[0_0_8px_rgba(0,123,255,0.5)]');

            // Включаем нужную вкладку
            document.getElementById('tab-' + tabName).classList.add('active');
            
            // Делаем нужную кнопку синей и со свечением
            const activeBtn = document.getElementById('btn-' + tabName);
            activeBtn.className = "nav-btn flex-1 flex flex-col items-center gap-1 p-2 text-primary";
            activeBtn.querySelector('i').classList.add('drop-shadow-[0_0_8px_rgba(0,123,255,0.5)]');

            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        // Анимация рулетки
        function playArena() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            const wheel = document.getElementById('wheel');
            // Крутим рандомно от 4 до 8 оборотов
            const rotation = Math.floor(Math.random() * 1440) + 1440; 
            wheel.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
